name: Publish to PyPI

on:
  push:
    branches:
      - main

# Skip this workflow if triggered by the auto-bump commit itself
# (prevents infinite loop: publish → bump commit → publish → ...)
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if this is an auto-bump commit
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qE "^chore: bump (version|ext version) to"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping publish — triggered by auto-bump commit"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-trigger
    if: needs.check-trigger.outputs.skip == 'false'
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v

  publish:
    needs: [check-trigger, test]
    if: needs.check-trigger.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump patch version
        id: bump
        run: |
          # Read current version from __init__.py
          CURRENT=$(python -c "import re; v=re.search(r'__version__ = \"(.+?)\"', open('contextcraft/__init__.py').read()).group(1); print(v)")
          # Bump patch (e.g. 0.1.0 -> 0.1.1)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          # Write back
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" contextcraft/__init__.py
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $CURRENT -> $NEW"

      - name: Commit and tag new version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contextcraft/__init__.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags

      - name: Install build
        run: pip install build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
