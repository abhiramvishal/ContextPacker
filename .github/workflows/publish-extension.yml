name: Publish VS Code Extension

on:
  push:
    tags:
      - "ext-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd vscode-extension
          npm install
      - name: Compile
        run: |
          cd vscode-extension
          npm run compile
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Package
        run: |
          cd vscode-extension
          vsce package
      - name: Publish to Marketplace
        run: |
          cd vscode-extension
          vsce publish --pat ${{ secrets.VSCE_PAT }}
